name: GrokCast
options:
  bundleIdPrefix: com.scubasteve1999
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "49"

configs:
  Debug: debug
  Release: release

packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    majorVersion: 11.0.0
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    majorVersion: 11.0.0

targetTemplates:
  AppTarget:
    type: application
    platform: iOS
    sources:
      - path: GrokCast
        excludes:
          - "**/Info.plist"
          - "Features/Radar/NWSRadarOverlay.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scubasteve1999.GrokCast
        INFOPLIST_FILE: GrokCast/Info.plist
        DEVELOPMENT_TEAM: "742YD3WJAR"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          # Avoids GrokCast.debug.dylib injection that can fail simulator preflight checks (Xcode 16+).
          ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: CoreLocation.framework
      - sdk: MapKit.framework
      - sdk: Foundation.framework
      - sdk: UserNotifications.framework
      - sdk: BackgroundTasks.framework
      - sdk: PhotosUI.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftData.framework
      - sdk: ActivityKit.framework
      - sdk: AppIntents.framework

targets:
  GrokCast:
    templates:
      - AppTarget
    entitlements:
      path: GrokCast/GrokCast.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scubasteve1999.GrokCast
        aps-environment: production
    settings:
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: GrokCast/GrokCast-Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: GrokCast/GrokCast.entitlements
    info:
      path: GrokCast/Info.plist
      properties:
        CFBundleDisplayName: SpotterCast
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        NSSupportsLiveActivities: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "SpotterCast uses your location to show accurate local weather forecasts and AI-powered insights."
        NSLocationAlwaysAndWhenInUseUsageDescription: "SpotterCast can use Apple’s low-power Significant Location Changes to refresh weather when you travel a significant distance. This is not continuous GPS tracking. You can turn this off in Settings."
        NSPhotoLibraryAddUsageDescription: "SpotterCast saves AI-generated weather images to your Photo Library when you choose Save."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.grokcast.alerts.refresh
        CFBundleURLTypes:
          - CFBundleURLName: com.grokcast.GrokCast
            CFBundleURLSchemes:
              - grokcast
    dependencies:
      - target: GrokCastWidgets
        embed: true
      - package: MapboxMaps
      - package: firebase-ios-sdk
        product: FirebaseMessaging

  GrokCastWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GrokCastWidgets
        excludes:
          - "**/Info.plist"
      - path: GrokCast/Shared/Widget
      - path: GrokCast/Shared/LiveActivity
      - path: GrokCast/Shared/Models/Location.swift
      - path: GrokCast/Shared/Models/OpenMeteoModels.swift
    entitlements:
      path: GrokCastWidgets/GrokCastWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scubasteve1999.GrokCast
    info:
      path: GrokCastWidgets/Info.plist
      properties:
        CFBundleDisplayName: SpotterCast Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scubasteve1999.GrokCast.GrokCastWidgets
        INFOPLIST_FILE: GrokCastWidgets/Info.plist
        DEVELOPMENT_TEAM: "742YD3WJAR"
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework
      - sdk: ActivityKit.framework
      - sdk: CoreLocation.framework

schemes:
  GrokCast:
    build:
      targets:
        GrokCast: all
        GrokCastWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  GrokCastWidgets:
    build:
      targets:
        GrokCastWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

